<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#f093fb"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="50%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#FFE66D"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Pattern -->
  <g opacity="0.06">
    <circle cx="100" cy="100" r="70" fill="white"/>
    <circle cx="1100" cy="530" r="90" fill="white"/>
    <circle cx="1050" cy="120" r="50" fill="white"/>
    <circle cx="150" cy="480" r="55" fill="white"/>
    <circle cx="600" cy="50" r="40" fill="white"/>
  </g>
  <!-- Logo -->
  <rect x="530" y="100" width="90" height="90" rx="20" fill="url(#logoGrad)"/>
  <text x="575" y="163" text-anchor="middle" font-size="50" font-weight="bold" fill="white" font-family="Arial, sans-serif">作</text>
  <!-- Title -->
  <text x="600" y="275" text-anchor="middle" font-size="78" font-weight="bold" fill="white" font-family="Arial, sans-serif">手作課</text>
  <text x="600" y="365" text-anchor="middle" font-size="72" font-weight="bold" fill="url(#accentGrad)" font-family="Arial, sans-serif">作品上傳平台</text>
  <!-- Subtitle -->
  <text x="600" y="425" text-anchor="middle" font-size="28" fill="white" opacity="0.85" font-family="Arial, sans-serif">記錄每一份用心創作的美好時刻</text>
  <!-- Badge -->
  <rect x="415" y="460" width="370" height="46" rx="23" fill="rgba(255,255,255,0.15)"/>
  <text x="600" y="491" text-anchor="middle" font-size="22" fill="white" font-family="Arial, sans-serif" font-weight="600">六年級專屬 ・ Google 雲端上傳</text>
  <!-- Class color dots -->
  <g transform="translate(400, 545)">
    <circle cx="0" cy="0" r="14" fill="#6366F1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial">1</text>
    <circle cx="42" cy="0" r="14" fill="#EF4444"/>
    <text x="42" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial">2</text>
    <circle cx="84" cy="0" r="14" fill="#10B981"/>
    <text x="84" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial">3</text>
    <circle cx="126" cy="0" r="14" fill="#F59E0B"/>
    <text x="126" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial">4</text>
    <circle cx="168" cy="0" r="14" fill="#3B82F6"/>
    <text x="168" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial">5</text>
    <circle cx="210" cy="0" r="14" fill="#8B5CF6"/>
    <text x="210" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Arial">6</text>
    <text x="250" y="6" font-size="18" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-weight="500">601~606 班級專區</text>
  </g>
</svg>
